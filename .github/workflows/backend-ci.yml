name: backend-ci

on:
  push:
    paths: [ "Backend/**" ]
  pull_request:
    paths: [ "Backend/**" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_DB: sharedgo_ci
          POSTGRES_USER: sharedgo_user
          POSTGRES_PASSWORD: sharegopass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sharedgo_user -d sharedgo_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: Backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: Backend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Lint code
        run: npm run lint

      - name: Prisma generate
        run: npx prisma generate

      - name: Prisma migrate
        env:
          DATABASE_URL: postgresql://sharedgo_user:sharegopass@localhost:5432/sharedgo_ci?schema=public
        run: npx prisma migrate deploy
      
      - name: Run Jest tests
        env:
          DATABASE_URL: postgresql://sharedgo_user:sharegopass@localhost:5432/sharedgo_ci?schema=public
        run: npm test

      - name: Type-check build
        env:
          DATABASE_URL: postgresql://sharedgo_user:sharegopass@localhost:5432/sharedgo_ci?schema=public
        run: npm run build
