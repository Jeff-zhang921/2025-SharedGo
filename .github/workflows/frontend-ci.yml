name: frontend-ci

on:
  push:
    paths: [ "frontend/**" ]
  pull_request:
    paths: [ "frontend/**" ]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Node.js setup
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' #To speed up subsequent runs
          cache-dependency-path: frontend/package-lock.json
        
      - name: Install deps
        run: npm ci

      - name: Type check and linting
        run: |
          npm run lint
          npx tsc --noEmit

      - name: Build project
        run: npm run build
