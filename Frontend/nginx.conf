server {
    listen 80 default_server;
    server_name _;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        # This line is the magic: it tells Nginx to send all requests to index.html
        # so React Router can take over the routing.
        try_files $uri $uri/ /index.html;
    }

    # Optional: Caching for static assets
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}