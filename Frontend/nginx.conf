server {
    listen 80 default_server;
    server_name sharedgo.link www.sharedgo.link;
    resolver 127.0.0.11 ipv6=off valid=30s;
    set $backend_upstream backend:3000;

    # 1. TOP PRIORITY: SOCKETS
    location ^~ /socket.io/ {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    #Forward API requests to the backend server
    location /api/ {
        proxy_pass http://$backend_upstream; 

        # for socket.io
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Explicitly ensure Upgrade headers don't break standard REST calls
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # 3. FALLBACK: FRONTEND
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
